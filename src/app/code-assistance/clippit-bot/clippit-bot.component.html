@if(isExtensionEnabled() ) {
<div class="fixed bottom-4 right-4 z-50 flex flex-col items-end font-sans bot-placeholder">
  @if (isOpen()) {
  <div class="chat-wrapper">
    <nb-chat size="medium" class="clippit-bot">
      <div *nbCustomMessage="'button'; let payload" class="custom-message-container">
        <p class="text-control button-custom-message-text">{{ payload.text }}</p>
        <button nbButton status="primary" size="small" (click)="executeButtonAction(payload)">
          {{ payload.buttonLabel || 'Apply Changes' }}
        </button>
      </div>
      <nb-chat-message *ngFor="let msg of messages()" [type]="msg.type" [message]="msg.text" [reply]="msg.reply"
        [sender]="msg.user.name" [date]="msg.date" [files]="msg.files" [quote]="msg.quote" [avatar]="msg.user.avatar"
        [customMessageData]="msg.customMessageData">
      </nb-chat-message>
    </nb-chat>
    <app-chat-form (send)="sendMessage($event)" [dropFiles]="true">
    </app-chat-form>
  </div>
  }
  <div (click)="toggleChat()" [class.clippy-idle]="shouldAnimate()"
    class="relative cursor-pointer group w-20 h-20 flex items-end justify-center hover:scale-105 transition-transform">
    @if (assistanceGifUrl() && assistanceGifUrl() !== '') {
    <div class="progress-container">
      <div class="progress-gif">
        <img [src]="assistanceGifUrl()" />
      </div>
    </div>
    }
    <div
      class="absolute -top-10 left-1/2 transform -translate-x-1/2 bg-black text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none">
      Click for help!
    </div>
  </div>
</div>
}
