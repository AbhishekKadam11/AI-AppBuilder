<!-- src/app/nebular-textarea/nebular-textarea.component.html -->
<div class="nb-textarea-wrapper">
  <!-- Toolbar – Nebular buttons -->
  <div class="nb-toolbar">
    <button
      class="nb-btn nb-btn-bold"
      [class.nb-active]="toolbar.bold"
      (click)="$any(this).toggleFormat('b', toolbar.bold, $event)"
      aria-label="Bold (Ctrl+B)"
    >
      <nb-icon>format_bold</nb-icon>
    </button>

    <button
      class="nb-btn nb-btn-italic"
      [class.nb-active]="toolbar.italic"
      (click)="$any(this).toggleFormat('i', toolbar.italic, $event)"
      aria-label="Italic (Ctrl+I)"
    >
      <nb-icon>format_text_italic</nb-icon>
    </button>

    <button
      class="nb-btn nb-btn-underline"
      [class.nb-active]="toolbar.underline"
      (click)="$any(this).toggleFormat('u', toolbar.underline, $event)"
      aria-label="Underline (Ctrl+U)"
    >
      <nb-icon>format_underline</nb-icon>
    </button>

    <button
      class="nb-btn nb-btn-link"
      [class.nb-active]="toolbar.link"
      (click)="$any(this).toggleFormat('a', toolbar.link, $event)"
      aria-label="Insert link"
    >
      <nb-icon>link</nb-icon>
    </button>

    <button
      class="nb-btn nb-btn-image"
      [class.nb-active]="toolbar.image"
      (click)="$any(this).toggleFormat('img', toolbar.image, $event)"
      aria-label="Insert image"
    >
      <nb-icon>image</nb-icon>
    </button>

    <button
      class="nb-btn nb-btn-list"
      [class.nb-active]="toolbar.list"
      (click)="$any(this).toggleFormat('ul', toolbar.list, $event)"
      aria-label="Bullet list"
    >
      <nb-icon>list_ul</nb-icon>
    </button>

    <button
      class="nb-btn nb-btn-heading"
      [class.nb-active]="toolbar.heading"
      (click)="$any(this).toggleFormat('h1', toolbar.heading, $event)"
      aria-label="Heading"
    >
      <nb-icon>heading</nb-icon>
    </button>
  </div>

  <!-- Scrollable editor -->
  <div #editor class="nb-editor" contenteditable [innerHTML]="sanitizedModel" (input)="onInput()"></div>
</div>
